<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/Tracking.css">
  <title>Tracking</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header>
    <div class="h-logo">
      <img src="images/amazon-logo.png" width="120px">      </div>
      <div class="h-searchbar">
        <input class="h-searchbarinput" placeholder="Search">
        <button class="h-searchbaricon"><i class="fas fa-search"></i></button>
      </div>
      <div class="h-returnorders">Return & Orders</div>
      <div class="h-cart">
        <p>3</p>
        <i class="fa-solid fa-cart-shopping"> </i>
      </div>
               

  </header>
  <div class="orders">

  <div class="viewtext">
    <a href="Orders.html">View all orders</a>
  </div>
  <div class="texts">
    <h1 class="arrivingtext">Arriving on Monday, June 13</h1>
    <p class="productname">Black and Gray Athletic Cotton Socks - 6 Pairs</p>
    <p class="quantitytext">Quantity: 1</p>
    <div class="imgdiv">
    <img src="images/products-img/product1.png">
    </div>
  </div>
  </div>
  <div class="progress">
    <div class="progress-preparing"><p>Preparing</p></div>

    <div class="progress-delivered"><p>Delivered</p></div>

    <div class="over-progress-bar"></div>

  </div>
